<div class="container">
	<div class="col-md-12">
		<h1>
			Commande simple
			<button type="button" class="btn btn-info" role="add-simple-command">
				Ajouter <span class="glyphicon glyphicon-plus"></span>
			</button>
		</h1>
	</div>
</div>

{{#data.simpleCommands}}
<div class="container" role="simple-command">
	<div class="col-md-3">
		<input type="text" name="command" value="{{command}}" class="form-control" />
	</div>
	<div class="col-md-7">
		<input type="text" name="message" value="{{message}}" class="form-control" />
	</div>
	<div class="col-md-2">
		<button type="button" class="btn btn-danger center" role="delete">
			<span class="glyphicon glyphicon-trash"></span>
		</button>
	</div>
</div>
{{/data.simpleCommands}}

<div class="container">
	<div class="col-md-12">
		<hr>
	</div>
	<div class="col-md-12">
		<h1>Variables</h1>
	</div>
	<div class="col-md-6">
		${user} : <em>celui qui à taper la commande</em>
	</div>
	<div class="col-md-6">
		${channel} : <em>channel ou la commande est entrée</em>
	</div>
</div>


<div class="container">
	<div class="col-md-12">
		<hr>
	</div>
	<div class="col-md-12">
		<button type="button" class="btn btn-primary center" role="save">
			Sauvegarder <span class="glyphicon glyphicon-floppy-disk"></span>
		</button>
	</div>
</div>
