<div class="container" role="item-use">
	<div class="col-sm-3">
		<input type="text" name="item" value="{{item}}" placeholder="object" class="form-control" />
	</div>
	<div class="col-sm-4">
		<input type="text" name="message" value="{{message}}" placeholder="message ${var}"
			class="form-control" />
	</div>
	<div class="col-sm-2">
		<input type="hidden" name="usage" value="{{usage}}">
		<div class="btn-group auto-drop-down">
			<button type="button" class="btn btn-default dropdown-toggle" data-toggle="dropdown"
				aria-expanded="false">
				{{usage}} <span class="caret"></span>
			</button>
			<ul class="dropdown-menu" role="menu">
				<li><a href="#" role="pvGain">Gain Pv</a></li>
				<li><a href="#" role="xpGain">Gain Xp</a></li>
			</ul>
		</div>
	</div>
	<div class="col-sm-2">
		<input type="text" name="var" value="{{var}}" placeholder="variable" class="form-control" />
	</div>
	<div class="col-sm-1">
		<button type="button" class="btn btn-danger center" role="delete">
			<span class="glyphicon glyphicon-trash"></span>
		</button>
	</div>
</div>
